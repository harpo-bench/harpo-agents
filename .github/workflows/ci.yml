name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v

      - name: Syntax check
        run: |
          python -m py_compile src/harpo/core/events.py
          python -m py_compile src/harpo/trajectory/schema.py
          python -m py_compile src/harpo/semantic/analyzer.py
          python -m py_compile src/harpo/memory/causal_memory.py
